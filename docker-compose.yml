version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: faaif_db
      POSTGRES_USER: faaif
      POSTGRES_PASSWORD: faaif_secret
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U faaif -d faaif_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
